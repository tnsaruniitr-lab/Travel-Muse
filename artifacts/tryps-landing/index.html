  <!-- JSON-LD: HowTo -->

  <!-- JSON-LD: FAQPage -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "What is TRYPS?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "TRYPS is a group trip planning app for friends that helps you coordinate dates, build a shared itinerary, and split expenses — all in one place."
        }
      },
      {
        "@type": "Question",
        "name": "How is this different from WhatsApp or Google Sheets?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "WhatsApp is good for chatting and Google Sheets is flexible for manual planning, but neither is built for making group travel decisions. TRYPS gives your group one structured place to vote on dates, plan the itinerary, and track shared costs so decisions happen faster and fewer details get lost."
        }
      },
      {
        "@type": "Question",
        "name": "Does everyone need to download an app?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "No. People can join instantly via link or iMessage without installing anything."
        }
      },
      {
        "@type": "Question",
        "name": "Can everyone edit the plan?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. Everyone can respond to polls, contribute to the itinerary, and log expenses."
        }
      },
      {
        "@type": "Question",
        "name": "How does expense splitting work?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Log shared costs as they happen and TRYPS tracks balances so everyone can see what they owe at the end of the trip."
        }
      },
      {
        "@type": "Question",
        "name": "How do I start?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Create a trip, share the link with your group, and start planning together."
        }
      }
    ]
  }
  </script>
