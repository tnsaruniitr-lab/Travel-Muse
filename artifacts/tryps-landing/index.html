    <!-- FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is TRYPS?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "TRYPS is a group trip planning app for friends that helps you coordinate dates, build a shared itinerary, and split expenses — all in one place."
          }
        },
        {
          "@type": "Question",
          "name": "How is this different from WhatsApp or Google Sheets?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "WhatsApp is great for chatting. Google Sheets is great for data. But neither was built for making group decisions — which is why most trip planning over those tools drags on for weeks or collapses entirely. TRYPS is structured around the trip from day one. Dates, plans, and costs all live in one shared space your whole group can access. Decisions get made because the tool is designed to make them — not bury them in a thread."
          }
        },
        {
          "@type": "Question",
          "name": "Does everyone need to download an app?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. People can join instantly via link or iMessage without installing anything. One person creates the trip. Everyone else just shows up."
          }
        },
        {
          "@type": "Question",
          "name": "Can everyone edit the plan?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. It's fully collaborative — everyone can add to the itinerary, respond to polls, and log expenses."
          }
        },
        {
          "@type": "Question",
          "name": "How does expense splitting work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Log costs as they happen — the Airbnb, dinner, that spontaneous boat hire. TRYPS tracks balances and shows everyone what they owe at the end. No spreadsheet. No uncomfortable follow-ups."
          }
        },
        {
          "@type": "Question",
          "name": "How do I start?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Create a trip, share the link, and start planning. Takes under a minute."
          }
        }
      ]
    }
    </script>
