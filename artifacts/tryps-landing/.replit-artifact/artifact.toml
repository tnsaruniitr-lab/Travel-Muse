kind = "web"
previewPath = "/"
title = "TRYPS Landing Page"
version = "1.0.0"
id = "artifacts/tryps-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19919

[services.development]
run = "pnpm --filter @workspace/tryps-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tryps-landing", "run", "build" ]
publicDir = "artifacts/tryps-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19919"
BASE_PATH = "/"
